name: Cadence
options:
  bundleIdPrefix: com.cadence
  deploymentTarget:
    iOS: "26.0"
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  Cadence:
    type: application
    platform: iOS
    sources:
      - path: Cadence
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cadence.app
        INFOPLIST_FILE: Cadence/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: true
        CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: true
    info:
      path: Cadence/Info.plist
      properties:
        CFBundleDisplayName: Cadence
        CFBundleName: Cadence
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: Background
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSMicrophoneUsageDescription: "Cadence uses the microphone for focus detection features."
        NSUserNotificationsUsageDescription: "Cadence sends notifications when your focus session ends."
        NSHealthShareUsageDescription: "Cadence reads heart rate and HRV data to detect your flow state during focus sessions."
        NSHealthUpdateUsageDescription: "Cadence saves focus session data to Apple Health to track your wellness metrics."
    entitlements:
      path: Cadence/Cadence.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []

  CadenceMac:
    type: application
    platform: macOS
    sources:
      - path: CadenceMac
        type: group
      - path: Cadence/Models
        type: group
        excludes:
          - "*.entitlements"
      - path: Cadence/Services
        type: group
        excludes:
          - "*.entitlements"
          - "CadenceR11Service.swift"
          - "CadenceR12Service.swift"
          - "FocusService.swift"
          - "SoundService.swift"
          - "NotificationService.swift"
          - "MatchingService.swift"
          - "AICoachService.swift"
          - "AICoachingService.swift"
          - "FlowStateService.swift"
          - "CalendarExportService.swift"
          - "StatisticsService.swift"
          - "TeamService.swift"
          - "ExportService.swift"
          - "FreemiumService.swift"
          - "SubscriptionService.swift"
          - "APIService.swift"
          - "FocusPredictionService.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cadence.mac
        PRODUCT_NAME: CadenceMac
        INFOPLIST_FILE: CadenceMac/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "2"
        SWIFT_EMIT_LOC_STRINGS: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: true
    info:
      path: CadenceMac/Info.plist
      properties:
        CFBundleDisplayName: Cadence
        CFBundleName: CadenceMac
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "15.0"
        NSPrincipalClass: NSApplication
