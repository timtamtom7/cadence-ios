name: Cadence
options:
  bundleIdPrefix: com.cadence
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  Cadence:
    type: application
    platform: iOS
    sources:
      - path: Cadence
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cadence.app
        INFOPLIST_FILE: Cadence/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: true
        CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: true
    info:
      path: Cadence/Info.plist
      properties:
        CFBundleDisplayName: Cadence
        CFBundleName: Cadence
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: Background
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSMicrophoneUsageDescription: "Cadence uses the microphone for focus detection features."
        NSUserNotificationsUsageDescription: "Cadence sends notifications when your focus session ends."
