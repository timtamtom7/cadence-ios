name: CadenceMac
options:
  bundleIdPrefix: com.cadence
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO

targets:
  CadenceMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: ../Cadence/Models
      - path: ../Cadence/Services
        excludes:
          - "CadenceR11Service.swift"
          - "FlowStateService.swift"
          - "NotificationService.swift"
          - "MatchingService.swift"
          - "SubscriptionService.swift"
          - "TeamService.swift"
          - "FreemiumService.swift"
          - "CalendarExportService.swift"
          - "SoundService.swift"
      - path: ../Cadence/ViewModels
        excludes:
          - "*.swift"
      - path: ../Cadence/Views/Components
        excludes:
          - "GlassTabBar.swift"
          - "MatchFoundSheet.swift"
          - "SessionNoteSheet.swift"
          - "ShareSheet.swift"
          - "WeeklyGoalRing.swift"
      - path: ../Cadence/Resources/CadenceShared.swift
      - path: ../Cadence/Resources/Brand.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cadence.macos
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: false
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_EMIT_LOC_STRINGS: true
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
    info:
      path: Info.plist
      properties:
        CFBundleName: CadenceMac
        CFBundleDisplayName: Cadence
        CFBundleIdentifier: com.cadence.macos
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: CadenceMac
        LSMinimumSystemVersion: "15.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        LSApplicationCategoryType: "public.app-category.productivity"
